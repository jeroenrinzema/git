# A tiny, self-contained Gitea server for the pull-request kata.
#
# Gitea is a lightweight, self-hosted git forge (like a local GitHub). It gives
# you a real web UI with branches, pull requests, code review and a merge button
# — all running offline on your own machine. SQLite is used as the database, so
# there is nothing else to install.
#
# Bring it up with:  source ../../utils/gitea/gitea.sh && gitea-up
# Tear it down with: gitea-down            (add --purge to also wipe all data)
services:
  gitea:
    image: gitea/gitea:1.22
    container_name: git-kata-gitea
    restart: "no"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:3300/
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__service__DISABLE_REGISTRATION=false
    ports:
      - "3300:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data

volumes:
  gitea-data:
